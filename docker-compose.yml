services:
  # OPA — Policy Engine
  opa:
    image: openpolicyagent/opa:0.68.0
    command: run --server --addr :8181 /policies
    ports:
      - "8181:8181"
    volumes:
      - ./governance/policies:/policies:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Tube Layer — Inter-Pillar Transport
  tube:
    build:
      context: ./tube
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - TUBE_PORT=3000
      - TUBETLSVERSION=1.3
      - TUBEMTLSENABLED=false
      - OPA_ENDPOINT=http://opa:8181
    depends_on:
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Sentinel — Security Pillar
  sentinel:
    build:
      context: ./sentinel
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - SENTINEL_PORT=3001
      - OPA_ENDPOINT=http://opa:8181
      - TUBE_ENDPOINT=http://tube:3000
      - AUDITCHAINPATH=/data/audit/chain.json
    volumes:
      - ./sentinel/audit:/data/audit
    depends_on:
      tube:
        condition: service_healthy

  # Bolt — Performance Pillar
  bolt:
    build:
      context: ./bolt
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - BOLT_PORT=3002
      - OPA_ENDPOINT=http://opa:8181
      - TUBE_ENDPOINT=http://tube:3000
    depends_on:
      tube:
        condition: service_healthy

  # Palette — UX / Accessibility Pillar
  palette:
    build:
      context: ./palette
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PALETTE_PORT=3003
      - OPA_ENDPOINT=http://opa:8181
      - TUBE_ENDPOINT=http://tube:3000
    depends_on:
      tube:
        condition: service_healthy
