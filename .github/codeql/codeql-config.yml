name: "Cipher-tube CodeQL Config"

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - sentinel
  - bolt
  - palette
  - tube
  - ui
  - governance

paths-ignore:
  - node_modules
  - "/node_modules"
  - "/dist"
  - "/build"
  - "/target"
  - "/pycache"
  - "/vendor"
  - "/*.min.js"
  - "/*.min.css"
  - benchmarks/fixtures
  - storybook-static
  - coverage
  - docs
