name: "Sentinel · Security Scan"

on:
  pull_request:
    branches: [main, "release/"]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

concurrency:
  group: sentinel-security-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  ALLOWED_DEPS_PATH: governance/allowed-deps.json

jobs:
  secret-detection:
    name: "Secret Detection"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run detect-secrets
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --baseline .secrets.baseline
          detect-secrets audit --report --baseline .secrets.baseline
          RESULTS=$(detect-secrets scan --all-files --json)
          FINDINGS=$(echo "$RESULTS" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          count = sum(len(v) for v in data.get('results', {}).values())
          print(count)
          ")
          if [ "$FINDINGS" -gt 0 ]; then
            echo "::error::detect-secrets found $FINDINGS potential secret(s)"
            exit 1
          fi
      - uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --fail

  sast:
    name: "SAST Analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript, python, go
          config-file: .github/codeql/codeql-config.yml
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: sentinel-sast
      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
          generateSarif: true
      - if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif

  dependency-audit:
    name: "Dependency Audit (SCA)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js audit
        if: hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high
      - name: Python audit
        if: hashFiles('poetry.lock') != '' || hashFiles('requirements.txt') != ''
        run: |
          pip install pip-audit
          if [ -f poetry.lock ]; then
            pip-audit --require-hashes --desc -r <(poetry export -f requirements.txt --without-hashes)
          elif [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          fi
      - name: Rust audit
        if: hashFiles('Cargo.lock') != ''
        run: |
          cargo install cargo-audit
          cargo audit
      - name: Check allowed-deps allowlist
        run: |
          python3 << 'EOF'
          import json, sys, os
          path = os.environ.get('ALLOWED_DEPS_PATH', 'governance/allowed-deps.json')
          if not os.path.exists(path):
              print("⚠️  Allowlist not found — skipping"); sys.exit(0)
          with open(path) as f: allowed = json.load(f)
          violations = []
          if os.path.exists('package.json'):
              with open('package.json') as f: pkg = json.load(f)
              for dt in ['dependencies', 'devDependencies']:
                  for dep in pkg.get(dt, {}):
                      if dep not in allowed.get('node', {}).get('allowed', []):
                          violations.append(f"node: {dep}")
          if violations:
              print("❌ Unapproved dependencies:"); [print(f"  - {v}") for v in violations]; sys.exit(1)
          print("✅ All dependencies approved")
          EOF

  license-check:
    name: "License Compliance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: hashFiles('package.json') != ''
        run: npx license-checker --production --failOn "GPL-3.0;AGPL-3.0;SSPL-1.0" --summary

  lockfile-integrity:
    name: "Lock File Integrity"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - if: hashFiles('package.json') != ''
        run: |
          npm ci --ignore-scripts
          if ! git diff --quiet package-lock.json; then
            echo "::error::package-lock.json out of sync"; exit 1
          fi
